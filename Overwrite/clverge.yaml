###########################################
### windows11端版本
mode: rule
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
mixed-port: 7890
socks-port: 7891
port: 7892
redir-port: 0
tproxy-port: 0
###########################################
external-controller: 127.0.0.1:9090
secret: "788!@SDSt5@$@sfr2"
external-ui: "./profiles/ui" # 外部控制目录
###########################################
ipv6: false
bind-address: "*"
allow-lan: false
log-level: error
find-process-mode: strict
###########################################
lan-allowed-ips:
  - 127.0.0.1/32
  - ::/0
lan-disallowed-ips: []
authentication: []
skip-auth-prefixes:
  - 127.0.0.1/32
  - ::1/128
###########################################
keep-alive-interval: 15 # TCP Keep Alive 间隔,单位为秒,控制 Clash 发出 TCP Keep Alive 包的间隔,减少移动设备耗电问题的临时措施
###########################################
unified-delay: true # 统一延迟 true/false
tcp-concurrent: true # TCP 并发 如果域名解析结果对应多个IP,并发请求所有IP,选择握手最快的IP进行通讯
profile:
  store-selected: true
  store-fake-ip: true
###########################################
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "appleid.apple.com"
    - 'appleid.cdn-apple.com'
    - 'gsa.apple.com'
    - 'idmsa.apple.com'
    - 'itunes.apple.com'
    - 'apps.apple.com'
  override-destination: true # 是否使用嗅探结果作为实际访问,默认为 true
###########################################
tun:
  enable: true
  device: Mihomo
  stack: mixed
  auto-route: true
  auto-redirect: false # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  auto-detect-interface: true
  dns-hijack:
    - 0.0.0.0:53
  mtu: 1500
###########################################
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  prefer-h3: true
  use-system-hosts: false # 是否查询系统 hosts，默认 true
  respect-rules: true  # 仅对符合规则的请求使用 DNS
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'time.*.com'
    - 'ntp.*.com'
    - '+.mi.com'
    - '+.xiaomi.com'
    - '+.xiaomi.cn'
    - '+.xiaomi.net'
    - '+.xiaomiyoupin.com'
    - '+.mijia.tech'
    - '+.miot-spec.org'
    - '+.mi-img.com'
    - '+.eset.com'
    - '+.qq.com'
    - '+.eastmoney.com'
  default-nameserver:
      #- 114.114.114.114
      #- 180.184.1.1
      - 119.29.29.29
      #- tls://8.8.8.8:853
      - 223.5.5.5
  nameserver:
      #- 114.114.114.114
      #- 180.184.1.1
      - 119.29.29.29
      #- tls://8.8.8.8:853
      - 223.5.5.5
  nameserver-policy:
    geosite:CN:
      #- 114.114.114.114
      #- 180.184.1.1
      - 119.29.29.29
      #- tls://8.8.8.8:853
      - 223.5.5.5
    geosite:geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  proxy-server-nameserver:
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
  fallback:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
      - '+.x.com'
      - '+.twitter.com'
      - '+.reddit.com'
      - '+.telegram.org'
      - '+.chatgpt.com'
      - '+.openai.com'
      - '+.grok.com'
###########################################
geodata-mode: false # GEOIP 数据模式,更改 geoip 使用文件为 mmdb 或者 dat , true 为 dat
geosite-matcher: "succinct" # GeoSite 匹配器使用的实现 succinct (default, same as rule-set)/mph (from V2Ray, also `hybrid` in Xray)
geodata-loader: "standard" # GEO 文件加载模式 standard/memconservative
geo-auto-update: true # 自动更新 GEO 是否启用,可选 true/false
geo-update-interval: 72 # 更新间隔,单位 h
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/5927a/Environment/refs/heads/config/Download/Country.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# 节点订阅的参数 [每12小时更新一次订阅节点，每 60 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 21600, health-check: {enable: true, url: 'http://cp.cloudflare.com/generate_204', interval: 600}}

# 节点订阅   # url替换自己的，这个是机场订阅地址
proxy-providers:
  ONE:
   url: 'https://2ac1f3fd6129bf79822a647'
   <<: *NodeParam
   path: './proxy_provider/ONE.yaml'


  TWO:
    url: 'https://b868def4984ac043a850e9'
    <<: *NodeParam
    path: './proxy_provider/TWO.yaml'

