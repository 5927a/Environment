[General]
# Update-2025.09.23
# 日志级别
loglevel = warning
# WiFi 助手
wifi-assist = false
# 并发数据网络和 WiFi
all-hybrid = false
# 测试超时（秒）
test-timeout = 3
# 隐藏状态栏上的VPN图标
hide-vpn-icon = false
# IPv6 支持（默认关闭）
ipv6 = false
ipv6-vif = disabled
# 允许 Wi-Fi 访问 (仅 iOS ）
allow-wifi-access = false
wifi-access-http-port = 35001
wifi-access-socks5-port = 35001
allow-hotspot-access = false
# 通过 HTTP API 控制 Surge
http-api-tls = false
http-api-web-dashboard = false
# 排除简单主机名
exclude-simple-hostnames = true
# DNS 服务器
dns-server = 223.5.5.5, 119.29.29.29
doh-follow-outbound-mode = false
# DOH
internet-test-url = http://www.baidu.com
#
hijack-dns = 1.1.1.1:53, 9.9.9.9:53
# 通过代理使用 DoH
proxy-test-url = http://cp.cloudflare.com/generate_204
# 内网测速
show-error-page-for-reject = false
# 代理测速
udp-policy-not-supported-behaviour = reject
# 拒绝该请求，当连接类型为 HTTP 时，会返回一个错误页面
disable-geoip-db-auto-update = false
# 开启geoip更新
geoip-maxmind-url = https://raw.githubusercontent.com/5927a/Environment/config/Download/Country.mmdb

[Proxy Group]
# 订阅
AA22 = select, policy-path=https//x3456765x.com, update-interval=86400, hidden=0, include-all-proxies=0
# 订阅2
#BB22 = select, policy-path=https//c123456c.com, update-interval=86400, hidden=0, include-all-proxies=0
#
# CC = select, policy-path=https://, update-interval=86400, hidden=0, include-all-proxies=0

# 节点筛选
主出口 = smart, include-other-group="AA22", policy-regex-filter=(.*(?i)(日本|Japan|JP|美国|US|United|凤凰城|纽约)), hidden=0, no-alert=1, interval=180, tolerance=50, include-all-proxies=0
#主出口 = smart, include-other-group="AA22, BB22", policy-regex-filter=(.*(?i)(日本|Japan|JP|美国|US|United|凤凰城|纽约)), hidden=0, no-alert=1, interval=180, tolerance=50, include-all-proxies=0
备出口 = smart, include-other-group="AA22", policy-regex-filter=(.*(?i)(日本|Japan|JP|香港|HK|新加)), hidden=0, no-alert=1, interval=300, tolerance=50, include-all-proxies=0
#备出口 = smart, include-other-group="AA22, BB22", policy-regex-filter=(.*(?i)(日本|Japan|JP|香港|HK|新加)), hidden=0, no-alert=1, interval=300, tolerance=50, include-all-proxies=0
币出口 = smart, include-other-group="AA22", policy-regex-filter=(.*(?i)(SG|新加)), hidden=0, no-alert=1, interval=180, tolerance=50, include-all-proxies=0
#币出口 = smart, include-other-group="AA22, BB22", policy-regex-filter=(.*(?i)(SG|新加)), hidden=0, no-alert=1, interval=180, tolerance=50, include-all-proxies=0
# 选择上网模式

拒绝模式 = select, REJECT, no-alert=1, hidden=0

强制拒绝 = select, REJECT-DROP, no-alert=1, hidden=1

直连模式 = select, DIRECT, REJECT, 手动选择, no-alert=1

手动选择 = fallback, 主出口, 币出口, DIRECT, REJECT-DROP, no-alert=1

币圈选择 = select, 备出口, 手动选择, DIRECT, REJECT-DROP, no-alert=1

OpenAI = select, 手动选择, REJECT-DROP, no-alert=1

谷歌服务 = select, 手动选择, REJECT-DROP, no-alert=1

电报服务 = select, 手动选择, REJECT-DROP, no-alert=1

推特服务 = select, 手动选择, REJECT-DROP, no-alert=1

苹果服务 = select, DIRECT, 手动选择, REJECT-DROP, no-alert=1

默认代理 = select, 手动选择, DIRECT, REJECT-DROP, no-alert=1, hidden=0

[Rule]
# 局域网
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Homemade/lan.list,直连模式,"update-interval=604800"
# ios更新
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Homemade/ota.list,拒绝模式,"update-interval=604800"
# 拒绝
#RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Homemade/disconnet.list,拒绝模式,"update-interval=604800"
