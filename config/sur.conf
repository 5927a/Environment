# ASN
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Download/ASN.China.list,直连模式,"update-interval=604800"
# geoip
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Homemade/geoip.list,直连模式,"update-interval=-1"
# final模式
FINAL,默认代理,dns-failed

[SSID Setting]
# 连接到此SSID,暂停工作
QQ-5G suspend=true