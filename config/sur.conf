# 电报
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Download/Telegram.list,电报服务,"update-interval=604800"
# 推特
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Download/Twitter.list,推特服务,"update-interval=604800"
# OpenAI
RULE-SET,https://raw.githubusercontent.com/5927a/Environment/config/Download/OpenAI.list,OpenAI,"update-interval=604800"
