###########################################
### windows11端版本
mode: rule
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
mixed-port: 7890
socks-port: 7891
port: 7892
redir-port: 0
tproxy-port: 0
###########################################
external-controller: 127.0.0.1:9090
secret: "788!@SDSt5@$@sfr2"
external-ui: "./profiles/ui" # 外部控制目录
external-ui-url: "https://127.0.0.1"
###########################################
ipv6: false
bind-address: "*"
allow-lan: false
log-level: error
find-process-mode: strict
###########################################
lan-allowed-ips:
  - 127.0.0.1/32
  - ::/0
lan-disallowed-ips: []
authentication: []
skip-auth-prefixes:
  - 127.0.0.1/32
  - ::1/128
###########################################
keep-alive-interval: 15 # TCP Keep Alive 间隔,单位为秒,控制 Clash 发出 TCP Keep Alive 包的间隔,减少移动设备耗电问题的临时措施
###########################################
unified-delay: true # 统一延迟 true/false
tcp-concurrent: true # TCP 并发 如果域名解析结果对应多个IP,并发请求所有IP,选择握手最快的IP进行通讯
profile:
  store-selected: true
  store-fake-ip: true
###########################################
# sniffer:
#   enable: false
#   force-dns-mapping: false
#   parse-pure-ip: false
#   override-destination: false
sniffer:
  enable: true                 # 启用 sniffer
  force-dns-mapping: true      # 强制使用内置 DNS 映射嗅探域名
  parse-pure-ip: true          # 解析纯 IP 请求（如果可能提取域名）
  override-destination: true   # 用嗅探域名覆盖目标（影响路由）
  sniff:
    HTTP:
      ports: [80, 8080-8880]   # HTTP 嗅探端口
      override-destination: true
    TLS:
      ports: [443, 8443]       # TLS 嗅探端口
    QUIC:
      ports: [443, 8443]       # QUIC 嗅探端口
  skip-domain:                 # 跳过嗅探这些域名
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
  force-domain:                # 强制嗅探这些域名
    - "google.com"
    - "x.com"
    - "youtube.com"
    - "telegram.org"
    - "live.com"
    - "googlevideo.com"
###########################################
tun:
  enable: true
  device: Mihomo
  stack: mixed
  auto-route: true
  #auto-redirect: false # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  auto-detect-interface: true
  dns-hijack:
    - 0.0.0.0:53
  mtu: 1500
###########################################
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  prefer-h3: true
  use-system-hosts: false # 是否查询系统 hosts，默认 true
  respect-rules: true  # 仅对符合规则的请求使用 DNS
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
      #- geosite:connectivity-check
      - geosite:private
      - geosite:cn
  default-nameserver:
      - 119.29.29.29
      - 223.5.5.5
      - 1.1.1.1
      - 114.114.114.114
  nameserver:
      - 119.29.29.29
      - 223.5.5.5
      - 1.1.1.1
      - 114.114.114.114
  nameserver-policy:
    geosite:cn,private:
      - 119.29.29.29
      - 223.5.5.5
      - 114.114.114.114
    geosite:!cn,!private:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
      - https://9.9.9.9/dns-query
  proxy-server-nameserver:
      - https://223.5.5.5/dns-query
      - https://1.1.1.1/dns-query
      - https://1.12.12.12/dns-query
  fallback:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
      - https://9.9.9.9/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    #geosite:
    #  - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
      - '+.x.com'
      - '+.twitter.com'
      - '+.reddit.com'
      - '+.telegram.org'
      - '+.chatgpt.com'
      - '+.openai.com'
      - '+.grok.com'
###########################################
geodata-mode: false # GEOIP 数据模式,更改 geoip 使用文件为 mmdb 或者 dat , true 为 dat
geosite-matcher: "succinct" # GeoSite 匹配器使用的实现 succinct (default, same as rule-set)/mph (from V2Ray, also `hybrid` in Xray)
geodata-loader: "standard" # GEO 文件加载模式 standard/memconservative
geo-auto-update: true # 自动更新 GEO 是否启用,可选 true/false
geo-update-interval: 72 # 更新间隔,单位 h
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# 节点订阅的参数 [每12小时更新一次订阅节点，每 60 秒一次健康检查]
