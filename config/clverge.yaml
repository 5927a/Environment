   path: './proxy_provider/ONE.yaml'


  TWO:
    url: 'https://448c72a739f85ed91c'
    <<: *NodeParam
    path: './proxy_provider/TWO.yaml'

  THREE:
    url: 'https://32d1520f3bac7168028b'
