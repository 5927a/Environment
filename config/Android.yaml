  - {name: 日美, type: url-test, url: 'https://cp.cloudflare.com/generate_204', interval: 120, tolerance: 70, timeout: 5000, include-all: true, filter: ".*(?i)(日本|Japan|JP|美国|US|United|凤凰城|纽约)", icon: https://raw.githubusercontent.com/5927a/Environment/refs/heads/config/Colors/Final.png}
